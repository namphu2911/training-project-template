<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Documents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./dist/css/home-page.css" rel="stylesheet">

  <!-- Iconify -->
  <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
</head>

<body>

  <div class="sp-container">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md sp-navbar">
      <div class="container-fluid px-0">
        <button class="navbar-toggler sp-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#spNavbar"
          aria-controls="spNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <iconify-icon icon="pajamas:hamburger"></iconify-icon>
        </button>

        <!-- Menu items -->
        <div class="collapse navbar-collapse" id="spNavbar">
          <ul class="navbar-nav">
            <!-- New dropdown -->
            <li class="nav-item dropdown">
              <button class="nav-link sp-nav-btn dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"
                data-bs-auto-close="true">
                <iconify-icon icon="fluent-mdl2:add" class="sp-icon-pink"></iconify-icon>
                <span>New</span>
                <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
              </button>
              <ul class="dropdown-menu sp-dropdown">
                <li>
                  <button class="dropdown-item sp-dropdown-item" id="btn-new-folder">
                    <iconify-icon icon="pajamas:folder-new" class="sp-dropdown-icon"></iconify-icon> New folder
                  </button>
                </li>
                <li>
                  <button class="dropdown-item sp-dropdown-item" id="btn-new-file">
                    <iconify-icon icon="pajamas:doc-new" class="sp-dropdown-icon"></iconify-icon> New file
                  </button>
                </li>
              </ul>
            </li>

            <!-- Upload dropdown -->
            <li class="nav-item dropdown">
              <button class="nav-link sp-nav-btn dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"
                data-bs-auto-close="true">
                <iconify-icon icon="fluent-mdl2:upload" class="sp-icon-pink"></iconify-icon>
                <span>Upload</span>
                <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
              </button>
              <ul class="dropdown-menu sp-dropdown">
                <li>
                  <button class="dropdown-item sp-dropdown-item" id="btn-upload-folder">
                    <iconify-icon icon="icon-park-outline:folder-upload" class="sp-dropdown-icon"></iconify-icon> Upload
                    folder
                  </button>
                </li>
                <li>
                  <button class="dropdown-item sp-dropdown-item" id="btn-upload-files">
                    <iconify-icon icon="fluent-mdl2:bulk-upload" class="sp-dropdown-icon"></iconify-icon> Upload files
                  </button>
                </li>
              </ul>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn" id="btn-sync">
                <iconify-icon icon="fluent-mdl2:sync-to-p-c" class="sp-icon-pink"></iconify-icon>
                <span>Sync</span>
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn">
                <iconify-icon icon="vscode-icons:file-type-excel2" class="sp-icon-green"></iconify-icon>
                <span>Export to Excel</span>
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn">
                <iconify-icon icon="fluent-mdl2:flow" class="sp-icon-pink"></iconify-icon>
                <span>Flow</span>
                <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn sp-nav-more">
              </button>
            </li>
            <li class="nav-item ms-md-auto">
              <div class="sp-auth-user" id="sp-auth-user">Not signed in</div>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn" id="btn-auth-login" type="button">
                <iconify-icon icon="fluent:person-key-24-filled" class="sp-icon-pink"></iconify-icon>
                <span>Sign in</span>
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link sp-nav-btn" id="btn-auth-logout" type="button" style="display: none;">
                <iconify-icon icon="fluent:person-arrow-right-20-filled" class="sp-icon-pink"></iconify-icon>
                <span>Sign out</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="sp-main">
      <!-- Breadcrumb title -->
      <div class="sp-breadcrumb-bar">
        <h1 class="sp-title" id="sp-title">Documents</h1>
        <nav aria-label="breadcrumb" class="sp-breadcrumb-nav" id="sp-breadcrumb"></nav>
      </div>

      <!-- table -->
      <table class="sp-table">
        <thead>
          <tr>
            <th class="sp-col-select"></th>
            <th class="sp-col-icon">
              <iconify-icon icon="fluent-mdl2:page"></iconify-icon>
            </th>
            <th class="sp-col-name">
              Name <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
            </th>
            <th class="sp-col-modified">
              Modified <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
            </th>
            <th class="sp-col-modified-by">
              Modified By <iconify-icon icon="fluent-mdl2:chevron-down" class="sp-chevron"></iconify-icon>
            </th>
            <th class="sp-col-add">
              <iconify-icon icon="fluent-mdl2:add"></iconify-icon> Add column
            </th>
            <th class="sp-col-actions">
              Actions
            </th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows rendered dynamically by JS -->
        </tbody>
      </table>
    </main>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./dist/js/home-page.js"></script>
</body>

</html>
